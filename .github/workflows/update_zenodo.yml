name: Sync Zenodo files to README

on:
  schedule:
    - cron: "0 2 * * 0"  # Every Sunday 02:00 UTC
  workflow_dispatch:       # Manual trigger
  push:
    branches: [main]
    paths:
      - "scripts/update_readme_zenodo.py"

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch Zenodo metadata and update README
        run: python scripts/update_readme_zenodo.py

      - name: Commit updated README
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to README — skipping commit."
          else
            git commit -m "chore: sync Zenodo file list in README [skip ci]"
            git push
            echo "README updated and pushed."
          fi
